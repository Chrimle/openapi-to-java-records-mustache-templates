# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

permissions: { }

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  detect-changes:
    name: Check Modified Files
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Detect file changes via API
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # For PRs: Ask the PR API (grabs up to 100 files, usually sufficient for CI)
            URL="repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files?per_page=100"
          else
            # For Pushes: Ask the Compare API
            URL="repos/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.event.after }}"
          fi

          CHANGED_FILES=$(gh api $URL --jq '.files[].filename' || gh api $URL --jq '.[].filename')
          
          echo "--- All Changed Files ---"
          echo "$CHANGED_FILES"
          
          # Regex files to ignore...
          IGNORE_PATTERN="^(\.github/.*\.md|\.idea/.*|docs/.*|\.gitattributes|\.gitignore|CITATION\.cff|README\.md|LICENSE)$"
          
          # Filter out the ignored files (grep -v inverts the match). 
          # `|| true` prevents grep from returning an exit code 1 if no files match.
          REMAINING_FILES=$(echo "$CHANGED_FILES" | grep -v -E "$IGNORE_PATTERN" || true)
          
          echo "--- Files requiring a build ---"
          echo "$REMAINING_FILES"
          
          if [ -z "$REMAINING_FILES" ]; then
            echo "Only ignored files were changed. Skipping the build matrix."
            echo "should_run=false" >> $GITHUB_OUTPUT
          else
            echo "Relevant source files changed. Triggering the build matrix."
            echo "should_run=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.should_run == 'true' }}
    name: Maven Build
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    strategy:
      matrix:
        openapi-generator-maven-plugin-version: [
          7.23.0,
          7.22.0,
          7.21.0,
          7.20.0,
          7.19.0,
          7.18.0,
          7.17.0,
          7.16.0,
          7.15.0,
          7.14.0,
          7.13.0,
          7.12.0,
          7.11.0
        ]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Maven Build - openapi-generator-maven-plugin:${{ matrix.openapi-generator-maven-plugin-version }}
        run: |
          # Check Modules to Skip Building
          # Skip test-spring, since the mustache templates are not backwards compatible with these versions
          SPRING_INCOMPATIBLE_VERSIONS="7.11.0 7.12.0 7.13.0 7.14.0 7.15.0 7.16.0 7.17.0 7.18.0 7.19.0 7.20.0"
          SKIP_FLAG=""
          
          if [[ $SPRING_INCOMPATIBLE_VERSIONS =~ "${{ matrix.openapi-generator-maven-plugin-version }}" ]]; then
            echo "Incompatible version detected. Skipping test-spring module."
            SKIP_FLAG="-pl \"!test-spring\""
          fi
          
          mvn -B package $SKIP_FLAG --no-transfer-progress --file pom.xml -Dopenapi-generator-maven-plugin.version=${{ matrix.openapi-generator-maven-plugin-version }}
  maven-build-status:
    name: Maven Build Status
    needs: [ detect-changes, build ]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ] || [ "${{ needs.build.result }}" == "skipped" ]; then
            echo "Build successful or skipped (as expected)."
            exit 0
          else
            echo "Build failed or cancelled."
            exit 1
          fi