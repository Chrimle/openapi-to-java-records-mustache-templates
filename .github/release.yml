# .github/release.yml

changelog:
  exclude:
    labels:
      - meta
      - doc
      - test
  categories:
    - title: Security
      labels:
        - security

    - title: New Features
      labels:
        - feat
      exclude:
        labels:
          - "library: okhttp-gson"
          - "library: spring-boot"
          - "library: webclient"

    - title: "[okhttp-gson] New Features"
      labels:
        - feat
        - "library: okhttp-gson"
      exclude:
        labels:
          - bug

    - title: "[spring-boot] New Features"
      labels:
        - feat
        - "library: spring-boot"
      exclude:
        labels:
          - bug

    - title: "[webclient] New Features"
      labels:
        - feat
        - "library: webclient"
      exclude:
        labels:
          - bug

    - title: Bug Fixes
      labels:
        - bug
      exclude:
        labels:
          - "library: okhttp-gson"
          - "library: spring-boot"
          - "library: webclient"

    - title: "[okhttp-gson] Bug Fixes"
      labels:
        - bug
        - "library: okhttp-gson"
      exclude:
        labels:
          - feat

    - title: "[spring-boot] Bug Fixes"
      labels:
        - bug
        - "library: spring-boot"
      exclude:
        labels:
          - feat

    - title: "[webclient] Bug Fixes"
      labels:
        - bug
        - "library: webclient"
      exclude:
        labels:
          - feat

    - title: Dependency Updates
      labels:
        - dependencies

    - title: Preview Changes
      labels:
        - preview
